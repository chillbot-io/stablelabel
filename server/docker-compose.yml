services:
  # ── PostgreSQL + TimescaleDB ──────────────────────────────────
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: stablelabel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: stablelabel
    # Bind to localhost only — containers communicate via Docker network.
    # Remove the ports section entirely in production.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stablelabel"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    # Bind to localhost only — containers communicate via Docker network.
    # Remove the ports section entirely in production.
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────
  api:
    build:
      context: ./stablelabel-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      SL_DATABASE_URL: postgresql+asyncpg://stablelabel:${POSTGRES_PASSWORD}@postgres:5432/stablelabel
      SL_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── arq worker (same image, different entrypoint) ─────────────
  worker:
    build:
      context: ./stablelabel-api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["arq", "app.worker.settings.WorkerSettings"]
    env_file: .env
    environment:
      SL_DATABASE_URL: postgresql+asyncpg://stablelabel:${POSTGRES_PASSWORD}@postgres:5432/stablelabel
      SL_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React frontend (nginx) ───────────────────────────────────
  web:
    build:
      context: ./stablelabel-web
      dockerfile: Dockerfile
      args:
        VITE_ENTRA_CLIENT_ID: ${VITE_ENTRA_CLIENT_ID}
        VITE_ENTRA_AUTHORITY: ${VITE_ENTRA_AUTHORITY:-https://login.microsoftonline.com/common}
        VITE_ENTRA_REDIRECT_URI: ${VITE_ENTRA_REDIRECT_URI:-http://localhost:80}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
