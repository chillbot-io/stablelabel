<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark rounded background -->
  <rect x="0" y="0" width="512" height="512" rx="108" ry="108" fill="#0f0f11"/>

  <!-- 4 quadrants — compliance pillars with 12px gap forming a + cross -->
  <!-- Top-left: Blue (Information Protection / Labels) -->
  <rect x="88" y="88" width="156" height="156" rx="18" ry="18" fill="#3b82f6"/>

  <!-- Top-right: Violet (DLP / Policies) -->
  <rect x="268" y="88" width="156" height="156" rx="18" ry="18" fill="#8b5cf6"/>

  <!-- Bottom-left: Teal (Retention) -->
  <rect x="88" y="268" width="156" height="156" rx="18" ry="18" fill="#14b8a6"/>

  <!-- Bottom-right: Amber (Safety / Snapshots) -->
  <rect x="268" y="268" width="156" height="156" rx="18" ry="18" fill="#f59e0b"/>
</svg>
