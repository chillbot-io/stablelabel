name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  typescript-tests:
    name: TypeScript Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stablelabel-gui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: stablelabel-gui/package-lock.json

      - run: npm ci
      - run: npm test

  python-tests:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stablelabel-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -e ".[dev]"
      - run: pytest --tb=short -q

  powershell-tests:
    name: PowerShell Tests (Pester)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          $config = New-PesterConfiguration
          $config.Run.Path = './StableLabel/Tests'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'pester-results.xml'
          $config.TestResult.OutputFormat = 'JUnitXml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-results
          path: pester-results.xml

  # ── Security scanning ──────────────────────────────────────
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Python dependency audit
      - name: Audit Python dependencies
        working-directory: stablelabel-api
        run: |
          pip install pip-audit
          pip-audit -r <(pip install -e ".[dev]" --dry-run --report - 2>/dev/null || true) || true
          pip install -e "."
          pip-audit

      # Node dependency audit
      - name: Audit Node dependencies (GUI)
        working-directory: stablelabel-gui
        run: npm audit --omit=dev || true

      - name: Audit Node dependencies (Web)
        working-directory: stablelabel-web
        run: npm audit --omit=dev || true

      # Python SAST with bandit
      - name: Run bandit (Python SAST)
        working-directory: stablelabel-api
        run: |
          pip install bandit
          bandit -r app/ -ll -ii --skip B101
