services:
  # ── PostgreSQL + TimescaleDB ──────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: stablelabel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stablelabel}
      POSTGRES_DB: stablelabel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stablelabel"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────
  api:
    build:
      context: ./stablelabel-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      SL_DATABASE_URL: ${SL_DATABASE_URL:-postgresql+asyncpg://stablelabel:stablelabel@postgres:5432/stablelabel}
      SL_REDIS_URL: ${SL_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── arq worker (same image, different entrypoint) ─────────────
  worker:
    build:
      context: ./stablelabel-api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["arq", "app.worker.settings.WorkerSettings"]
    env_file: .env
    environment:
      SL_DATABASE_URL: ${SL_DATABASE_URL:-postgresql+asyncpg://stablelabel:stablelabel@postgres:5432/stablelabel}
      SL_REDIS_URL: ${SL_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React frontend (nginx) ───────────────────────────────────
  web:
    build:
      context: ./stablelabel-web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
